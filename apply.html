<!DOCTYPE html>
<html>
<head>
<title>Apply - Royal Atlas Transport</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#08111f;
color:white;
padding:40px;
max-width:800px;
margin:auto;
}
h1{color:#FFD700;text-align:center;}
form{
background:#101c2f;
padding:30px;
border-radius:15px;
}
input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
background:#FFD700;
color:black;
padding:15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}
</style>
</head>
<body>

<h1>Royal Atlas Transport Application</h1>

<form action="https://formsubmit.co/royalatlastransport@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New Royal Atlas Transport Application">

<input type="text" name="TruckersMP Name" placeholder="TruckersMP Name" required>

<input type="text" name="Discord Username" placeholder="Discord Username" required>

<input type="url" name="Steam Profile" placeholder="Steam Profile Link">

<input type="number" name="Age" placeholder="Age" required>

<input type="text" name="Country" placeholder="Country" required>

<input type="number" name="ETS2 Hours" placeholder="ETS2 Hours">

<textarea name="Previous VTC Experience" placeholder="Previous VTC Experience"></textarea>

<textarea name="Why Join" placeholder="Why do you want to join Royal Atlas Transport?" required></textarea>

<button type="submit">Submit Application</button>

</form>

</body>
</html>
